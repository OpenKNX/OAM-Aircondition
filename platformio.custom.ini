; ============= Waveshare ESP32-S3-Zero ============== 
[board_Waveshare_ESP32_S3_Zero]
extends = ESP32_4MB
board = esp32-s3-devkitm-1
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM
  -D PROG_BUTTON_PIN=0
 # -D OPENKNX_SERIALLED_ENABLE
 # -D OPENKNX_SERIALLED_PIN=21
 # -D OPENKNX_SERIALLED_COLOR_RED=50,0,0
 # -D OPENKNX_SERIALLED_COLOR_GREEN=0,35,0
 # -D OPENKNX_SERIALLED_COLOR_BLUE=0,0,63
 # -D OPENKNX_SERIALLED_COLOR_YELLOW=40,30,0
 # -D OPENKNX_SERIALLED_NUM=1
  -D PROG_LED_PIN=11
  -D PROG_LED_PIN_ACTIVE_ON=1
  -D PROG_LED_COLOR=OPENKNX_SERIALLED_COLOR_RED
  -D KNX_UART_NUM=1
  -D KNX_UART_RX_PIN=16
  -D KNX_UART_TX_PIN=17
  -D KNX_IP_WIFI
  -D OPENKNX_AIR_CONDITION_SERIAL=Serial2
  -D OPENKNX_AIR_CONDITION_SERIAL_TX=27
  -D OPENKNX_AIR_CONDITION_SERIAL_RX=26

[env:develop_Waveshare_ESP32_S3_Zero_TP]
extends = ESP32_develop, custom_develop_ESP32, custom_develop, board_Waveshare_ESP32_S3_Zero
monitor_speed = 921600
build_flags =
  ${KNX_TP.build_flags}
  ${ESP32_develop.build_flags}
  ${custom_develop_ESP32.build_flags}
  ${custom_develop.build_flags}
  ${board_Waveshare_ESP32_S3_Zero.build_flags}
  -D DEVELOPMENT

[env:develop_Waveshare_ESP32_S3_Zero_TP_USB]
extends = ESP32_UPLOAD_USB, env:develop_Waveshare_ESP32_S3_Zero_TP


; ============= AZDelivery ESP32 Board Dev Kit C V4 ============== 
[board_AZDelivery_DevKit_C_V4]
board = esp32dev
extends = ESP32_4MB
board_build.partitions = esp32_4mb.csv
build_flags =
  -D DEVICE_ID='"AZD-ESP32-DevKit-V4"'
  -D DEVICE_NAME='"AZDelivery ESP32 Board Dev Kit C V4"'
  -D PROG_BUTTON_PIN=0
  -D PROG_LED_PIN=2
  -D PROG_LED_PIN_ACTIVE_ON=1
  -D KNX_UART_NUM=1
  -D KNX_UART_RX_PIN=16
  -D KNX_UART_TX_PIN=17
  -D KNX_IP_WIFI
  -D OPENKNX_AIR_CONDITION_SERIAL=Serial2
  -D OPENKNX_AIR_CONDITION_SERIAL_TX=27
  -D OPENKNX_AIR_CONDITION_SERIAL_RX=26

[env:develop_AZDelivery_DevKit_C_V4_TP]
extends = ESP32_develop, custom_develop_ESP32, custom_develop, board_AZDelivery_DevKit_C_V4
build_flags =
  ${KNX_TP.build_flags}
  ${ESP32_develop.build_flags}
  ${custom_develop_ESP32.build_flags}
  ${custom_develop.build_flags}
  ${board_AZDelivery_DevKit_C_V4.build_flags}
  -D DEVELOPMENT
 
[env:develop_AZDelivery_DevKit_C_V4_TP_USB]
extends = ESP32_UPLOAD_USB, env:develop_AZDelivery_DevKit_C_V4_TP

[env:develop_AZDelivery_DevKit_C_V4_IP]
extends = ESP32_develop, custom_develop_ESP32, custom_develop, board_AZDelivery_DevKit_C_V4
build_flags =
  ${KNX_IP.build_flags}
  ${ESP32_develop.build_flags}
  ${custom_develop_ESP32.build_flags}
  ${custom_develop.build_flags}
  ${board_AZDelivery_DevKit_C_V4.build_flags}
  -D DEVELOPMENT
  -D OPENKNX_OVERRIDE_MASK_VERSION=0x07B0

[env:develop_AZDelivery_DevKit_C_V4_IP_USB]
extends = ESP32_UPLOAD_USB, env:develop_AZDelivery_DevKit_C_V4_IP

[env:release_AZDelivery_DevKit_C_V4_TP]
extends = custom_release_ESP32, board_AZDelivery_DevKit_C_V4
build_flags =
   ${custom_release_ESP32.build_flags}  
   ${board_AZDelivery_DevKit_C_V4.build_flags}
   ${KNX_TP.build_flags}

[env:release_AZDelivery_DevKit_C_V4_TP_OTA]
extends = custom_release_ESP32, board_AZDelivery_DevKit_C_V4
build_flags =
   ${custom_release_ESP32.build_flags}  
   ${board_AZDelivery_DevKit_C_V4.build_flags}
   ${KNX_TP.build_flags}
  upload_protocol = espota
  upload_port = #192.168.0.14 # IP Address

[env:release_AZDelivery_DevKit_C_V4_IP]
extends = custom_release_ESP32, board_AZDelivery_DevKit_C_V4
build_flags =
   ${custom_release_ESP32.build_flags}  
   ${board_AZDelivery_DevKit_C_V4.build_flags}
  ${KNX_IP.build_flags}
  -D OPENKNX_OVERRIDE_MASK_VERSION=0x07B0


