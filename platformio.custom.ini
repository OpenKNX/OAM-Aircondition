; ====================================================
; ================== Global Custom =================== 
; ====================================================

[custom] ; options valid for all builds
build_flags =
  -D SERIAL_DEBUG=Serial
  -D OPENKNX_MAX_LOG_MESSAGE_LENGTH=1024

[custom_develop] ; options valid only for develop builds
extends = custom
build_flags =
  ${custom.build_flags}
  ;-D OPENKNX_HEARTBEAT
  -D OPENKNX_HEARTBEAT_PRIO
  ;-D OPENKNX_RTT
  ;-D BUFFER_SIZE_UP=10240
  ;-D DEBUG_LOOP_TIME=10 ; will print a info when a loop took more than x ms.
  ;-D LOGIC_TRACE
  ; to see trace logs, they must match one of the 5 filters (TRACE_LOG1 .. TRACE_LOG2)
  ;"-D OPENKNX_TRACE1=OTAUpdateModule.*"
  ;"-D OPENKNX_TRACE2=Flash.*"
debug_build_flags = -ggdb3
  -O0

[custom_release] ; options valid only for release builds
extends = custom
build_flags =
  ${custom.build_flags}


; ====================================================
; ====================== RP2040 ====================== 
; ====================================================
[RP2040_custom] ; options valid for all RP2040 builds
build_flags = 
  -D USE_KNX_DMA_UART=0
  -D USE_KNX_DMA_IRQ=0
  -Wunused-variable
  -Llib/OGM-SensorDevices/src/bsec2/cortex-m0plus
  -lalgobsec
  ${KNX_TP.build_flags} ; all RP2040 builds use TP


[RP2040_custom_develop] ; normally, do not add something here.
extends = RP2040_develop, custom_develop, RP2040_custom
build_flags = 
  ${RP2040_develop.build_flags}
  ${custom_develop.build_flags}
  ${RP2040_custom.build_flags}


[RP2040_custom_releases] ; normally, do not add something here.
extends = RP2040_releases, custom_release, RP2040_custom
build_flags = 
  ${RP2040_releases.build_flags}
  ${custom.build_flags}
  ${RP2040_custom.build_flags}


; ====================================================
; ====================== ESP32 ======================= 
; ====================================================
[ESP32_custom] ; options valid for all ESP32 builds
build_flags =

[custom_develop_ESP32] ; normally, do not add something here.
extends = ESP32_develop, custom_develop, ESP32_custom
build_type = release ; Use release because debug causes app crash at startup for unknown reason
build_flags =
  -g ; Generate debug info - used instead of build_type=debug 
  ${ESP32_develop.build_flags}
  ${custom_develop.build_flags} 
  ${ESP32_custom.build_flags} 

[custom_release_ESP32] ; normally, do not add something here.
extends = ESP32_releases, custom_release, ESP32_custom
build_flags =
  ${ESP32_releases.build_flags}
  ${custom_release.build_flags}
  ${ESP32_custom.build_flags} 


; ================== UP1-GW-UART =================== 
[board_OpenKNX_UP1_GW_UART]
extends = 
build_flags =
  -D DEVICE_UP1_GW_UART
  -D SENSORMODULE
  -D OPENKNX_AIR_CONDITION_SERIAL=Serial2
  -D OPENKNX_AIR_CONDITION_SERIAL_TX=UART1_TX_PIN
  -D OPENKNX_AIR_CONDITION_SERIAL_RX=UART1_RX_PIN

[env:develop_OpenKNX_UP1_GW_UART]
extends = RP2040_custom_develop, board_OpenKNX_UP1_GW_UART
build_flags =
  ${RP2040_custom_develop.build_flags}
  ${board_OpenKNX_UP1_GW_UART.build_flags}

[env:release_OpenKNX_UP1_GW_UART]
extends = RP2040_custom_releases, board_OpenKNX_UP1_GW_UART
build_flags =
  ${RP2040_custom_releases.build_flags}
  ${board_OpenKNX_UP1_GW_UART.build_flags}

; ================== OPENKNXIAO-esp32s3-mini-V1 =================== 
[oknxhw_OPENKNXIAO_ESP32S3_MINI_V1]
extends = ESP32_8MB
board = seeed_xiao_esp32s3
build_flags =
  -D OKNXHW_OPENKNXIAO_ESP32S3_MINI_V1
  -D OPENKNX_OVERRIDE_MASK_VERSION=0x07B0
  -D KNX_IP_WIFI
  ${KNX_IP.build_flags}
  -D OPENKNX_AIR_CONDITION_SERIAL=Serial2
  -D OPENKNX_AIR_CONDITION_SERIAL_TX=OKNXHW_OPENKNXIAO_D4
  -D OPENKNX_AIR_CONDITION_SERIAL_RX=OKNXHW_OPENKNXIAO_D2

[env:develop_OPENKNXIAO_ESP32S3_MINI_V1]
extends = custom_develop_ESP32, oknxhw_OPENKNXIAO_ESP32S3_MINI_V1
build_flags =
  ${oknxhw_OPENKNXIAO_ESP32S3_MINI_V1.build_flags}
  ${custom_develop_ESP32.build_flags}

[env:release_OPENKNXIAO_ESP32S3_MINI_V1]
extends = custom_release_ESP32, oknxhw_OPENKNXIAO_ESP32S3_MINI_V1
build_flags =
  ${oknxhw_OPENKNXIAO_ESP32S3_MINI_V1.build_flags}
  ${custom_release_ESP32.build_flags}

