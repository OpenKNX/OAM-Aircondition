;
; global custom
;
[custom]
build_flags =
  -D KNX_FLASH_SIZE=0 #Setting not used because partion knx is used, but must be defined
  -I lib/OGM-HardwareConfig/include/
  -D OPENKNX_DUALCORE
  -D OPENKNX_MAX_LOG_MESSAGE_LENGTH=1024

 
  
[custom_develop]
extends = custom
build_flags =
  ${custom.build_flags}
  ;-D OPENKNX_HEARTBEAT
  ; -D OPENKNX_HEARTBEAT_PRIO
  ; -D OPENKNX_RTT
  ; -D BUFFER_SIZE_UP=10240
  ; -D DEBUG_LOOP_TIME=10 ; will print a info when a loop took more than x ms.
  ; -D LOGIC_TRACE
  ; ; to see trace logs, they must match one of the 5 filters (TRACE_LOG1 .. TRACE_LOG2)
  ;"-D OPENKNX_TRACE1=OTAUpdateModule.*"
  ;"-D OPENKNX_TRACE2=Flash.*"
debug_build_flags = -ggdb3
  -O0


; ESP32
[custom_ESP32]
extends = ESP32, custom
monitor_filters = esp32_exception_decoder 
build_flags =
  ${ESP32.build_flags}
  -D SERIAL_DEBUG=Serial
  -D KNX_FLASH_CALLBACK
  -D HVAC_DEBUG
build_unflags =
  -D LWIP_DONT_PROVIDE_BYTEORDER_FUNCTIONS
lib_deps = 
	#homespan/HomeSpan@2.1.0
  #HomeSpan=symlink://../HomeSpan

[custom_release_ESP32]
extends = ESP32_releases, custom, custom_ESP32
build_flags =
  ${ESP32_releases.build_flags}
  ${custom.build_flags}
  ${custom_ESP32.build_flags}
  -D OPENKNX_USB_EXCHANGE_IGNORE
  -D OPENKNX_LOOPTIME_WARNING=10


[develop_ESP32]
extends = ESP32_develop, custom_ESP32, custom_develop
build_flags =
  ${ESP32_develop.build_flags}
  ${custom_ESP32.build_flags}
  ${custom_develop.build_flags}
  -D LED_BUILTIN=2
  -D DEVELOPMENT


; ------ Waveshare ESP32-S3-Zero ------
[board_Waveshare_ESP32_S3_Zero]
extends = ESP32_4MB
board = esp32-s3-devkitm-1
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM
  -D PROG_BUTTON_PIN=0
 # -D OPENKNX_SERIALLED_ENABLE
 # -D OPENKNX_SERIALLED_PIN=21
 # -D OPENKNX_SERIALLED_COLOR_RED=50,0,0
 # -D OPENKNX_SERIALLED_COLOR_GREEN=0,35,0
 # -D OPENKNX_SERIALLED_COLOR_BLUE=0,0,63
 # -D OPENKNX_SERIALLED_COLOR_YELLOW=40,30,0
 # -D OPENKNX_SERIALLED_NUM=1
  -D PROG_LED_PIN=11
  -D PROG_LED_PIN_ACTIVE_ON=1
  -D PROG_LED_COLOR=OPENKNX_SERIALLED_COLOR_RED
  -D KNX_UART_NUM=1
  -D KNX_UART_RX_PIN=16
  -D KNX_UART_TX_PIN=17
  -D KNX_IP_WIFI
  -D OPENKNX_AIR_CONDITION_SERIAL=Serial2
  -D OPENKNX_AIR_CONDITION_SERIAL_TX=27
  -D OPENKNX_AIR_CONDITION_SERIAL_RX=26


[env:develop_Waveshare_ESP32_S3_Zero_TP]
extends = ESP32_develop, custom_ESP32, custom_develop, board_Waveshare_ESP32_S3_Zero
monitor_speed = 921600
build_flags =
  ${KNX_TP.build_flags}

  ${ESP32_develop.build_flags}
  ${custom_ESP32.build_flags}
  ${custom_develop.build_flags}
  ${board_Waveshare_ESP32_S3_Zero.build_flags}
  -D DEVELOPMENT

[env:develop_Waveshare_ESP32_S3_Zero_TP_USB]
extends = ESP32_UPLOAD_USB, env:develop_Waveshare_ESP32_S3_Zero

; ------ AZDelivery ESP32 Board Dev Kit C V4 ------
[board_AZDelivery_DevKit_C_V4]
board = esp32dev
extends = ESP32_4MB
board_build.partitions = esp32_4mb.csv
build_flags =
  -D DEVICE_ID='"AZD-ESP32-DevKit-V4"'
  -D DEVICE_NAME='"AZDelivery ESP32 Board Dev Kit C V4"'
  -D PROG_BUTTON_PIN=0
  -D PROG_LED_PIN=2
  -D PROG_LED_PIN_ACTIVE_ON=1
  -D KNX_UART_NUM=1
  -D KNX_UART_RX_PIN=16
  -D KNX_UART_TX_PIN=17
  -D KNX_IP_WIFI
  -D OPENKNX_AIR_CONDITION_SERIAL=Serial2
  -D OPENKNX_AIR_CONDITION_SERIAL_TX=27
  -D OPENKNX_AIR_CONDITION_SERIAL_RX=26

[env:develop_AZDelivery_DevKit_C_V4_TP]
extends = ESP32_develop, custom_ESP32, custom_develop, board_AZDelivery_DevKit_C_V4
build_flags =
  ${KNX_TP.build_flags}
  ${ESP32_develop.build_flags}
  ${custom_ESP32.build_flags}
  ${custom_develop.build_flags}
  ${board_AZDelivery_DevKit_C_V4.build_flags}
  -D DEVELOPMENT
 
[env:develop_AZDelivery_DevKit_C_V4_TP_USB]
extends = ESP32_UPLOAD_USB, env:develop_AZDelivery_DevKit_C_V4_TP

[env:develop_AZDelivery_DevKit_C_V4_IP]
extends = ESP32_develop, custom_ESP32, custom_develop, board_AZDelivery_DevKit_C_V4
build_flags =
  ${KNX_IP.build_flags}
  ${ESP32_develop.build_flags}
  ${custom_ESP32.build_flags}
  ${custom_develop.build_flags}
  ${board_AZDelivery_DevKit_C_V4.build_flags}
  -D DEVELOPMENT
  -D OPENKNX_OVERRIDE_MASK_VERSION=0x07B0


[env:develop_AZDelivery_DevKit_C_V4_IP_USB]
extends = ESP32_UPLOAD_USB, env:develop_AZDelivery_DevKit_C_V4_IP

; ------ Adafruit ESP32 Feather V2 ------
[board_Adafruit_Feather_ESP32_V2]
extends = ESP32_8MB
board = adafruit_feather_esp32_v2
build_flags =
  -I lib/OGM-HardwareConfig/include/
  -D DEVICE_ADAFRUIT_ESP32_FEATHER_V2
  -D KNX_IP_WIFI
  -D OPENKNX_AIR_CONDITION_SERIAL=Serial2
  -D OPENKNX_AIR_CONDITION_SERIAL_TX=27
  -D OPENKNX_AIR_CONDITION_SERIAL_RX=26
     

[env:develop_Adafruit_Feather_ESP32_TP_V2]
extends = ESP32_develop, custom_ESP32, custom_develop, board_Adafruit_Feather_ESP32_V2
build_flags =
  ${KNX_TP.build_flags}
  ${ESP32_develop.build_flags}
  ${custom_ESP32.build_flags}
  ${custom_develop.build_flags}
  ${board_Adafruit_Feather_ESP32_V2.build_flags}
  -D DEVELOPMENT

[env:develop_Adafruit_Feather_ESP32_V2_TP_USB]
extends = ESP32_UPLOAD_USB, env:develop_Adafruit_Feather_ESP32_TP_V2

[env:develop_Adafruit_Feather_ESP32_V2_TP_OTA]
extends = env:develop_Adafruit_Feather_ESP32_V2
upload_protocol = espota
upload_port = x.x.x.x # 192.168.0.14 # IP Address

[env:develop_Adafruit_Feather_ESP32_IP_V2]
extends = ESP32_develop, custom_ESP32, custom_develop, board_Adafruit_Feather_ESP32_V2
build_flags =
  ${KNX_IP.build_flags}
  ${ESP32_develop.build_flags}
  ${custom_ESP32.build_flags}
  ${custom_develop.build_flags}
  ${board_Adafruit_Feather_ESP32_V2.build_flags}
  -D DEVELOPMENT
  -D OPENKNX_OVERRIDE_MASK_VERSION=0x07B0

[env:develop_Adafruit_Feather_ESP32_V2_IP_USB]
extends = ESP32_UPLOAD_USB, env:develop_Adafruit_Feather_ESP32_V2_IP

[env:develop_Adafruit_Feather_ESP32_V2_IP_OTA]
extends = env:develop_Adafruit_Feather_ESP32_V2
upload_protocol = espota
upload_port = x.x.x.x # 192.168.0.14 # IP Address

; ------ REG1 ESP ------
[env:develop_REG1_ESP_DEV_TP_NET_USB]
extends = custom, ESP32_develop, custom_ESP32, ESP32_libs, ESP32_8MB, ESP32_UPLOAD_USB
;platform = espressif32 @ ^6.7.0 ; IDF 4.4
build_flags =
  ${ESP32_develop.build_flags}
  ${custom_ESP32.build_flags}
  ${custom_develop.build_flags}
  ${KNX_TP.build_flags}
  -I lib/OGM-HardwareConfig/include/
  -D DEVICE_DEV_REG1_LAN_TP_Base_V00_11
  -D CONFIG_ETH_ENABLED
  -D BOARD_HAS_PSRAM
  -D KNX_IP_LAN
  -D SERIAL_DEBUG=Serial
  -D OPENKNX_AIR_CONDITION_SERIAL=Serial2
  -D OPENKNX_AIR_CONDITION_SERIAL_TX=27
  -D OPENKNX_AIR_CONDITION_SERIAL_RX=26


[env:develop_REG1_ESP_DEV_TP_NET_PROG]
extends = env:develop_REG1_ESP_DEV_TP_NET_USB, ESP32_8MB, UPLOAD_ESP_PROG
;platform = espressif32 @ ^6.7.0 ; IDF 4.4
build_flags =
  ${env:develop_REG1_ESP_DEV_TP_NET_USB.build_flags}


; ------ REG1-LAN-TP-Base ------
[env:develop_REG1_LAN_TP_BASE]
extends = custom, ESP32_develop, custom_ESP32, ESP32_libs, ESP32_8MB
build_flags =
  ${KNX_TP.build_flags}
  ${custom.build_flags}
  ${custom_ESP32.build_flags}
  ${ESP32_develop.build_flags}
  -I lib/OGM-HardwareConfig/include/
  -D DEVICE_REG1_LAN_TP_BASE
  -D OPENKNX_LED_TIME=info3Led
  -D OPENKNX_LED_IP=info2Led
  -D KNX_IP_LAN
  -D CONFIG_ETH_ENABLED
  -D BOARD_HAS_PSRAM

 

[env:develop_REG1_LAN_TP_BASE_JTAG]
extends = custom, ESP32_develop, custom_ESP32, ESP32_libs, UPLOAD_ESP_PROG
build_flags =
  ${KNX_TP.build_flags}
  ${custom.build_flags}
  ${custom_ESP32.build_flags}
  ${ESP32_develop.build_flags}
  -I lib/OGM-HardwareConfig/include/
  -D DEVICE_REG1_LAN_TP_BASE
  -D OPENKNX_LED_TIME=info3Led
  -D OPENKNX_LED_IP=info2Led
  -D KNX_IP_LAN
  -D CONFIG_ETH_ENABLED
  -D BOARD_HAS_PSRAM
 

[env:develop_REG1_LAN_BASE]
extends = ESP32_custom, ESP32_libs, develop_ESP, ESP32_UPLOAD_USB, ESP32_8MB
;platform = espressif32 @ ^6.7.0 ; IDF 4.4
build_flags =
  ${KNX_IP.build_flags}
  ${custom.build_flags}
  ${custom_ESP32.build_flags}
  ${ESP32_develop.build_flags}
  -I lib/OGM-HardwareConfig/include/
  -D DEVICE_REG1_LAN_TP_BASE
  -D OPENKNX_OVERRIDE_MASK_VERSION=0x07B0
  -D OPENKNX_LED_TIME=info3Led
  -D OPENKNX_LED_IP=info2Led
  -D CONFIG_ETH_ENABLED
  -D KNX_IP_LAN
  -D BOARD_HAS_PSRAM
 

; Release

[env:release_REG1_LAN_TP_BASE]
extends = custom_release_ESP32, ESP32_8MB
build_flags =
   ${custom_release_ESP32.build_flags}  
    ${KNX_TP.build_flags}
  -I lib/OGM-HardwareConfig/include/
  -D DEVICE_REG1_LAN_TP_BASE
  -D OPENKNX_LED_TIME=info3Led
  -D OPENKNX_LED_IP=info2Led
  -D KNX_IP_LAN
