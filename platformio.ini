; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
libdeps_dir = /tmp/libdeps
extra_configs = 
	lib/OGM-Common/platformio.base.ini
	lib/OGM-Common/platformio.esp32.ini
	platformio.custom.ini

[BASE]
build_flags = 
	-D OPENKNX
	-D NCN5120
	-D KNX_FLASH_CALLBACK
	-D SMALL_GROUPOBJECT
	-D USE_BINSEARCH
	-D OVERRUN_COUNT=31
	-D EOPR_TIMEOUT=32
	-Iinclude
	-Wuninitialized
	-Wunused-variable
	-Wno-unknown-pragmas
	-Wno-switch
debug_build_flags = 
	-ggdb3
	-O0

[KNX_TP]
build_flags = 
	-D MASK_VERSION=0x07B0

[KNX_IP]
build_flags = 
	-D MASK_VERSION=0x57B0

[KNX_IPTP]
build_flags = 
	-D MASK_VERSION=0x091A

[env]
framework = arduino
monitor_speed = 115200
monitor_filters = 
	direct
lib_ldf_mode = deep+
debug_tool = jlink
debug_extra_cmds = 
	set output-radix 16
extra_scripts = 
	lib/OGM-Common/scripts/pio/prepare.py
	lib/OGM-Common/scripts/pio/show_flash_partitioning.py

[UPLOAD_JLINK]
upload_protocol = jlink

[ESP32]
extends = BASE, ESP32_4MB
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32dev
board_build.filesystem = littlefs
framework = arduino
lib_ldf_mode = chain
extra_scripts = 
	lib/OGM-Common/scripts/pio/prepare.py
	lib/OGM-Common/scripts/pio/create_esp32_image.py
build_flags = 
	${BASE.build_flags}
monitor_filters = 
	esp32_exception_decoder
	${env.monitor_filters}
debug_build_flags = -O0 -ggdb3 -g3
debug_init_break = tbreak setup
debug_tool = esp-prog
upload_protocol = esptool
upload_speed = 460800

[ESP32_develop]
extends = ESP32
build_type = debug
build_flags = 
	-D OPENKNX_DEBUG
	${ESP32.build_flags}

[ESP32_releases]
extends = ESP32
build_flags = 
	-D OPENKNX_WATCHDOG
	${ESP32.build_flags}

[ESP32_UPLOAD_USB]

[UPLOAD_ESP_PROG]
upload_protocol = esp-prog
upload_speed = 921600

[ESP32_4MB]
board_build.partitions = lib/OGM-Common/data/partitions/esp32_4mb.csv

[ESP32_8MB]
board_build.partitions = lib/OGM-Common/data/partitions/esp32_8mb.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608

[ESP32_16MB]
board_build.partitions = lib/OGM-Common/data/partitions/esp32_16mb.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

[custom]
build_flags = 
	${KNX_TP.build_flags}
	-D KNX_FLASH_SIZE=0
	-I lib/OGM-HardwareConfig/include/
	-D OPENKNX_DUALCORE

[custom_develop]
extends = custom
build_flags = 
	${custom.build_flags}
debug_build_flags = -ggdb3
	-O0

[custom_ESP32]
extends = ESP32, custom
build_flags = 
	${ESP32.build_flags}
	-D SERIAL_DEBUG=Serial
	-D KNX_FLASH_CALLBACK
build_unflags = 
	-D LWIP_DONT_PROVIDE_BYTEORDER_FUNCTIONS
lib_deps = 

[custom_release_ESP32]
extends = ESP32_releases, custom, custom_ESP32
build_flags = 
	${ESP32_releases.build_flags}
	${custom.build_flags}
	${custom_ESP32.build_flags}
	-D OPENKNX_USB_EXCHANGE_IGNORE
	-D OPENKNX_LOOPTIME_WARNING=10

[develop_ESP32]
extends = ESP32_develop, custom_ESP32, custom_develop
build_flags = 
	${ESP32_develop.build_flags}
	${custom_ESP32.build_flags}
	${custom_develop.build_flags}
	-D LED_BUILTIN=2
	-D KNX_SERIAL=Serial2
	-D DEVELOPMENT
board_build.partitions = esp_partition.csv

[board_Adafruit_Feather_ESP32_V2]
extends = ESP32_8MB
build_flags = 
	-I lib/OGM-HardwareConfig/include/
	-D DEVICE_ADAFRUIT_ESP32_FEATHER_V2
	-D KNX_IP_WIFI
	-D OPENKNX_AIR_CONDITION_SERIAL=Serial2
	-D OPENKNX_AIR_CONDITION_SERIAL_TX=27
	-D OPENKNX_AIR_CONDITION_SERIAL_RX=26
board = adafruit_feather_esp32_v2

[env:develop_Adafruit_Feather_ESP32_V2]
extends = ESP32_develop, custom_ESP32, custom_develop, board_Adafruit_Feather_ESP32_V2
build_flags = 
	${ESP32_develop.build_flags}
	${custom_ESP32.build_flags}
	${custom_develop.build_flags}
	${board_Adafruit_Feather_ESP32_V2.build_flags}
	-D DEVELOPMENT
lib_deps = swicago/HeatPump@^1.0.0

[env:develop_Adafruit_Feather_ESP32_V2_USB]
extends = ESP32_UPLOAD_USB, env:develop_Adafruit_Feather_ESP32_V2
lib_deps = swicago/HeatPump@^1.0.0

[env:develop_Adafruit_Feather_ESP32_V2_OTA]
extends = env:develop_Adafruit_Feather_ESP32_V2
upload_protocol = espota
upload_port = x.x.x.x
lib_deps = swicago/HeatPump@^1.0.0

[env:develop_REG1_ESP_DEV_TP_NET_USB]
extends = custom, ESP32_develop, custom_ESP32, ESP32_libs, ESP32_8MB, ESP32_UPLOAD_USB
build_flags = 
	${ESP32_develop.build_flags}
	${custom_ESP32.build_flags}
	${custom_develop.build_flags}
	${KNX_TP.build_flags}
	-I lib/OGM-HardwareConfig/include/
	-D DEVICE_DEV_REG1_LAN_TP_Base_V00_11
	-D CONFIG_ETH_ENABLED
	-D BOARD_HAS_PSRAM
	-D KNX_IP_LAN
	-D SERIAL_DEBUG=Serial
	-D OPENKNX_AIR_CONDITION_SERIAL=Serial2
	-D OPENKNX_AIR_CONDITION_SERIAL_TX=27
	-D OPENKNX_AIR_CONDITION_SERIAL_RX=26
lib_deps = swicago/HeatPump@^1.0.0

[env:develop_REG1_ESP_DEV_TP_NET_PROG]
extends = env:develop_REG1_ESP_DEV_TP_NET_USB, ESP32_8MB, UPLOAD_ESP_PROG
build_flags = 
	${env:develop_REG1_ESP_DEV_TP_NET_USB.build_flags}
lib_deps = swicago/HeatPump@^1.0.0

[env:develop_REG1_LAN_TP_BASE]
extends = custom, ESP32_develop, custom_ESP32, ESP32_libs, ESP32_8MB
build_flags = 
	${KNX_TP.build_flags}
	${custom.build_flags}
	${custom_ESP32.build_flags}
	${ESP32_develop.build_flags}
	-I lib/OGM-HardwareConfig/include/
	-D DEVICE_REG1_LAN_TP_BASE
	-D OPENKNX_LED_TIME=info3Led
	-D OPENKNX_LED_IP=info2Led
	-D KNX_IP_LAN
	-D CONFIG_ETH_ENABLED
	-D BOARD_HAS_PSRAM
lib_deps = swicago/HeatPump@^1.0.0

[env:develop_REG1_LAN_TP_BASE_JTAG]
extends = custom, ESP32_develop, custom_ESP32, ESP32_libs, UPLOAD_ESP_PROG
build_flags = 
	${KNX_TP.build_flags}
	${custom.build_flags}
	${custom_ESP32.build_flags}
	${ESP32_develop.build_flags}
	-I lib/OGM-HardwareConfig/include/
	-D DEVICE_REG1_LAN_TP_BASE
	-D OPENKNX_LED_TIME=info3Led
	-D OPENKNX_LED_IP=info2Led
	-D KNX_IP_LAN
	-D CONFIG_ETH_ENABLED
	-D BOARD_HAS_PSRAM
lib_deps = swicago/HeatPump@^1.0.0

[env:develop_REG1_LAN_BASE]
extends = ESP32_custom, ESP32_libs, develop_ESP, ESP32_UPLOAD_USB, ESP32_8MB
build_flags = 
	${KNX_IP.build_flags}
	${custom.build_flags}
	${custom_ESP32.build_flags}
	${ESP32_develop.build_flags}
	-I lib/OGM-HardwareConfig/include/
	-D DEVICE_REG1_LAN_TP_BASE
	-D OPENKNX_OVERRIDE_MASK_VERSION=0x07B0
	-D OPENKNX_LED_TIME=info3Led
	-D OPENKNX_LED_IP=info2Led
	-D CONFIG_ETH_ENABLED
	-D KNX_IP_LAN
	-D BOARD_HAS_PSRAM
lib_deps = swicago/HeatPump@^1.0.0

[env:release_REG1_LAN_TP_BASE]
extends = custom_release_ESP32, ESP32_8MB
build_flags = 
	${custom_release_ESP32.build_flags}
	-I lib/OGM-HardwareConfig/include/
	-D DEVICE_REG1_LAN_TP_BASE
	-D OPENKNX_LED_TIME=info3Led
	-D OPENKNX_LED_IP=info2Led
	-D KNX_IP_LAN
	-D CONFIG_ETH_ENABLED
	-D BOARD_HAS_PSRAM
lib_deps = swicago/HeatPump@^1.0.0

[env:release_REG1_LAN_BASE]
extends = custom_release_ESP32, ESP32_8MB
build_flags = 
	${custom_release_ESP32.build_flags}
	-I lib/OGM-HardwareConfig/include/
	-D DEVICE_REG1_LAN_TP_BASE
	-D OPENKNX_LED_TIME=info3Led
	-D OPENKNX_LED_IP=info2Led
	-D KNX_IP_LAN
	-D CONFIG_ETH_ENABLED
	-D BOARD_HAS_PSRAM
	${KNX_IP.build_flags}
	-D OPENKNX_OVERRIDE_MASK_VERSION=0x07B0
lib_deps = swicago/HeatPump@^1.0.0

[env:release_Adafruit_Feather_ESP32_V2_TP]
extends = custom_release_ESP32, ESP32_8MB, board_Adafruit_Feather_ESP32_V2
build_flags = 
	${custom_release_ESP32.build_flags}
	${board_Adafruit_Feather_ESP32_V2.build_flags}
	-I lib/OGM-HardwareConfig/include/
lib_deps = swicago/HeatPump@^1.0.0

[env:release_Adafruit_Feather_ESP32_V2_TP_OTA]
extends = custom_release_ESP32, ESP32_8MB, board_Adafruit_Feather_ESP32_V2
build_flags = 
	${custom_release_ESP32.build_flags}
	${board_Adafruit_Feather_ESP32_V2.build_flags}
	-I lib/OGM-HardwareConfig/include/
	upload_protocol = espota
	upload_port =
lib_deps = swicago/HeatPump@^1.0.0

[env:release_Adafruit_Feather_ESP32_V2_IP]
extends = custom_release_ESP32, ESP32_8MB, board_Adafruit_Feather_ESP32_V2
build_flags = 
	${custom_release_ESP32.build_flags}
	${board_Adafruit_Feather_ESP32_V2.build_flags}
	-I lib/OGM-HardwareConfig/include/
	${KNX_IP.build_flags}
	-D OPENKNX_OVERRIDE_MASK_VERSION=0x07B0
lib_deps = swicago/HeatPump@^1.0.0
